name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (format + lint + test + audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Dependency audit
        run: pnpm audit --prod

      - name: Bundle size report
        run: |
          pnpm exec vite build 2>&1 | tee /tmp/build-output.txt
          echo "## Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '(dist/|\.js|\.css)' /tmp/build-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "See build output above" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  rust:
    name: Rust (format + clippy + test + audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust stable
        run: rustup update stable && rustup default stable && rustup component add clippy rustfmt

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Dependency audit
        working-directory: src-tauri
        run: cargo audit
