name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Install pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "Nozomi Launcher ${{ steps.tag.outputs.name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false

      - name: Package Steam compatibility tool tarball
        run: |
          mkdir -p nozomi-launcher
          cp src-tauri/target/release/nozomi-launcher nozomi-launcher/
          cp compat/* nozomi-launcher/
          tar -czf nozomi-launcher-${{ steps.tag.outputs.name }}.tar.gz nozomi-launcher

      - name: Upload tarball to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.tag.outputs.name }} nozomi-launcher-${{ steps.tag.outputs.name }}.tar.gz --clobber
