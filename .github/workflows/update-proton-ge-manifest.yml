name: Update Proton-GE Manifest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Regenerate manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest from upstream releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p manifests
          gh api "repos/GloriousEggroll/proton-ge-custom/releases?per_page=100" --paginate \
            | jq -s 'add' \
            | jq --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
              # Build the regular releases array
              [
                .[]
                | . as $r
                | ($r.assets[]? | select(.name | endswith(".tar.gz")))
                | {
                    tagName: $r.tag_name,
                    name: (.name | rtrimstr(".tar.gz")),
                    publishedAt: $r.published_at,
                    downloadUrl: .browser_download_url,
                    assetSize: .size
                  }
              ] as $releases |

              # Latest release is the first entry (API returns newest first)
              ($releases[0] + { tagName: "GE-Proton Latest" }) as $latestAlias |

              {
                schemaVersion: 1,
                category: "GE-Proton",
                generatedAt: $ts,
                source: "https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases",
                releases: ([$latestAlias] + $releases)
              }' > manifests/proton-ge.json

      - name: Validate manifest
        run: |
          jq -e '.schemaVersion == 1
                 and (.category | type == "string" and length > 0)
                 and (.releases | length > 0)
                 and all(.releases[]; .tagName and .name and .downloadUrl and .assetSize > 0)' \
             manifests/proton-ge.json > /dev/null

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -I '"generatedAt"' manifests/proton-ge.json; then
            echo "No upstream changes; skipping commit."
            exit 0
          fi
          git add manifests/proton-ge.json
          git commit -m "chore: update proton-ge manifest"
          git push
